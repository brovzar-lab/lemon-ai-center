<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controls — Lemon Studios</title>
  <link rel="stylesheet" href="../../../styles.css" />
  <style>
    body { margin: 0; padding: 32px; background: var(--color-bg-base); font-family: 'Inter', sans-serif; }
    .wrap { max-width: 680px; margin: 0 auto; }
    .lead { color: var(--color-text-tertiary); font-size: 13px; margin: 0 0 22px; }
    .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }

    /* Primary action — coral fill, uppercase tracked Inter (the app's submit button) */
    .btn-primary { background: var(--color-accent-coral); color: #fff; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
    /* Quiet action — outline on paper */
    .btn-ghost { background: transparent; color: var(--color-text-secondary); font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 16px; border: 1px solid var(--color-border-medium); border-radius: 6px; cursor: pointer; }

    /* Status badges — tinted accent on its own 12%-alpha wash (the priority dots/chips) */
    .badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 3px 9px; border-radius: 999px; }
    .badge-coral { color: var(--color-accent-coral); background: rgba(184,92,56,0.12); }
    .badge-lemon { color: var(--color-accent-lemon); background: rgba(201,162,39,0.14); }
    .badge-sage { color: var(--color-accent-sage); background: rgba(107,143,94,0.14); }
    .badge-blue { color: var(--color-accent-blue); background: rgba(74,122,155,0.14); }

    .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--color-text-secondary);
      background: var(--color-bg-elevated); border: 1px solid var(--color-border-soft); border-radius: 6px; padding: 4px 10px; }
    .dot { width: 7px; height: 7px; border-radius: 999px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="ed-section-label" style="margin-bottom:14px">Controls</div>
    <p class="lead">Composed from tokens — there is no component library here, so designs build controls from the token classes. These are the canonical patterns the app uses.</p>

    <div class="row">
      <button class="btn-primary">Send trust docs</button>
      <button class="btn-ghost">Snooze</button>
    </div>

    <div class="row">
      <span class="badge badge-coral">Critical</span>
      <span class="badge badge-lemon">At risk</span>
      <span class="badge badge-sage">On track</span>
      <span class="badge badge-blue">Info</span>
    </div>

    <div class="row">
      <span class="chip"><span class="dot" style="background:var(--color-accent-coral)"></span>Matadero — 21d stale</span>
      <span class="chip"><span class="dot" style="background:var(--color-accent-sage)"></span>Las Azules S2</span>
    </div>
  </div>
</body>
</html>
